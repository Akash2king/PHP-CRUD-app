name: Deploy to Azure Container Apps

on:
  push:
    branches: [master, main]
    paths:
      - '**/*.php'
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker/**'
      - 'crud.sql'
      - 'CSS/**'
      - '.github/workflows/azure-deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: php-crud-app
  CONTAINER_NAME: php-crud
  DB_NAME: crud
  DB_PORT: "3306"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Container App must authenticate to ACR to PULL (push auth alone is not enough)
      - name: Configure ACR pull on Container App
        run: |
          az containerapp registry set \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --server "${{ secrets.ACR_LOGIN_SERVER }}" \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password "${{ secrets.ACR_PASSWORD }}"

      - name: Set database secrets (from GitHub Secrets)
        run: |
          az containerapp secret set \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --secrets \
              "db-host=${{ secrets.DB_HOST }}" \
              "db-user=${{ secrets.DB_USER }}" \
              "db-password=${{ secrets.DB_PASSWORD }}"

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          acrName: ${{ secrets.ACR_NAME }}
          acrUsername: ${{ secrets.ACR_USERNAME }}
          acrPassword: ${{ secrets.ACR_PASSWORD }}
          containerAppName: ${{ secrets.CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      # One update: php-crud container + :latest image + DB env (avoids clearing image)
      - name: Wire container, image, and DB env
        env:
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
        run: |
          set -euo pipefail
          APP_ID=$(az containerapp show \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query id -o tsv)

          az rest --method PATCH \
            --uri "${APP_ID}?api-version=2024-03-01" \
            --body "{
              \"properties\": {
                \"template\": {
                  \"containers\": [{
                    \"name\": \"${{ env.CONTAINER_NAME }}\",
                    \"image\": \"${IMAGE}\",
                    \"resources\": { \"cpu\": 0.5, \"memory\": \"1Gi\" },
                    \"env\": [
                      {\"name\": \"PORT\", \"value\": \"80\"},
                      {\"name\": \"WEB_BIND\", \"value\": \"0.0.0.0\"},
                      {\"name\": \"DB_HOST\", \"secretRef\": \"db-host\"},
                      {\"name\": \"DB_PORT\", \"value\": \"${{ env.DB_PORT }}\"},
                      {\"name\": \"DB_NAME\", \"value\": \"${{ env.DB_NAME }}\"},
                      {\"name\": \"DB_USER\", \"secretRef\": \"db-user\"},
                      {\"name\": \"DB_PASSWORD\", \"secretRef\": \"db-password\"},
                      {\"name\": \"DB_SSL\", \"value\": \"true\"}
                    ]
                  }]
                }
              }
            }"

      - name: Print app URL
        run: |
          FQDN=$(az containerapp show \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          CONTAINER=$(az containerapp show \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].name" -o tsv)
          IMAGE=$(az containerapp show \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].image" -o tsv)
          echo "App URL: https://${FQDN}"
          echo "### Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Container: \`${CONTAINER}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: https://${FQDN}" >> "$GITHUB_STEP_SUMMARY"
