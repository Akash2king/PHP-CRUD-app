name: Deploy to Azure Container Apps

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: php-crud-app
  DB_NAME: crud
  DB_PORT: "3306"

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 12
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image reference
        id: meta
        run: |
          # Deploy immutable SHA tag (latest is also pushed for manual rollbacks)
          echo "image=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Container App
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy app
        env:
          APP: ${{ secrets.CONTAINER_APP_NAME }}
          RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          IMAGE: ${{ needs.build.outputs.image }}
          ACR_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          set -euo pipefail

          # Portal quickstart apps use this container name (not "php-crud")
          CONTAINER=$(az containerapp show \
            --name "$APP" \
            --resource-group "$RG" \
            --query "properties.template.containers[0].name" -o tsv)
          echo "Target container: ${CONTAINER}"

          az containerapp registry set \
            --name "$APP" \
            --resource-group "$RG" \
            --server "$ACR_SERVER" \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password "${{ secrets.ACR_PASSWORD }}"

          az containerapp secret set \
            --name "$APP" \
            --resource-group "$RG" \
            --secrets \
              "db-host=${{ secrets.DB_HOST }}" \
              "db-user=${{ secrets.DB_USER }}" \
              "db-password=${{ secrets.DB_PASSWORD }}"

          # Image first (must include --container-name or image is not applied)
          az containerapp update \
            --name "$APP" \
            --resource-group "$RG" \
            --container-name "$CONTAINER" \
            --image "$IMAGE"

          # Env on same container (separate revision; secrets now active)
          az containerapp update \
            --name "$APP" \
            --resource-group "$RG" \
            --container-name "$CONTAINER" \
            --replace-env-vars \
              "DB_HOST=secretref:db-host" \
              "DB_USER=secretref:db-user" \
              "DB_PASSWORD=secretref:db-password" \
              "DB_NAME=${{ env.DB_NAME }}" \
              "DB_PORT=${{ env.DB_PORT }}" \
              "DB_SSL=true" \
              "PORT=80" \
              "WEB_BIND=0.0.0.0"

      - name: App URL
        run: |
          FQDN=$(az containerapp show \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "### Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ needs.build.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: https://${FQDN}" >> "$GITHUB_STEP_SUMMARY"
