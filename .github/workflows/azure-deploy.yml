name: Deploy to Azure Container Apps

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: php-crud-app
  DB_NAME: crud
  DB_PORT: "3306"

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 12
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image reference
        id: meta
        run: |
          echo "image=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Container App
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy app (registry + image + DB config)
        env:
          APP: ${{ secrets.CONTAINER_APP_NAME }}
          RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          IMAGE: ${{ needs.build.outputs.image }}
          ACR_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          set -euo pipefail

          # ACR pull credentials for Container Apps (idempotent, ~few seconds)
          az containerapp registry set \
            --name "$APP" \
            --resource-group "$RG" \
            --server "$ACR_SERVER" \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password "${{ secrets.ACR_PASSWORD }}"

          # DB secrets (single API call)
          az containerapp secret set \
            --name "$APP" \
            --resource-group "$RG" \
            --secrets \
              "db-host=${{ secrets.DB_HOST }}" \
              "db-user=${{ secrets.DB_USER }}" \
              "db-password=${{ secrets.DB_PASSWORD }}"

          # New revision: image + env in one update (faster than multiple revisions)
          az containerapp update \
            --name "$APP" \
            --resource-group "$RG" \
            --image "$IMAGE" \
            --replace-env-vars \
              "DB_HOST=secretref:db-host" \
              "DB_USER=secretref:db-user" \
              "DB_PASSWORD=secretref:db-password" \
              "DB_NAME=${{ env.DB_NAME }}" \
              "DB_PORT=${{ env.DB_PORT }}" \
              "DB_SSL=true" \
              "PORT=80" \
              "WEB_BIND=0.0.0.0"

      - name: App URL
        run: |
          FQDN=$(az containerapp show \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "### Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ needs.build.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: https://${FQDN}" >> "$GITHUB_STEP_SUMMARY"
